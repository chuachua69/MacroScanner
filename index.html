<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<title>Macro Scanner</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230e1116'/><text x='16' y='23' text-anchor='middle' font-size='20'>📡</text></svg>">
<style>
:root {
  --bg:#0e1116; --card:#161c24; --card2:#1c2430; --line:#2a3442;
  --text:#e6edf3; --dim:#8b98a5; --green:#3fb96f; --amber:#d8a637; --red:#e5534b; --blue:#5b9bd5;
}
*{box-sizing:border-box;margin:0;}
body{
  background:var(--bg);color:var(--text);
  font:16px/1.55 -apple-system,"Segoe UI",Roboto,sans-serif;
  padding:16px 14px 0;max-width:640px;margin:0 auto;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
h1{font-size:20px;letter-spacing:.3px;}
#week{color:var(--dim);font-size:12px;}
#ver{font-size:10px;color:var(--dim);opacity:.6;margin-left:6px;}
#update-toast{
  display:none;position:fixed;bottom:calc(76px + env(safe-area-inset-bottom) + 10px);
  left:50%;transform:translateX(-50%);
  background:#1c3a2a;border:1px solid var(--green);color:var(--green);
  font-size:13px;padding:10px 18px;border-radius:10px;z-index:99;
  box-shadow:0 4px 20px rgba(0,0,0,.5);cursor:pointer;white-space:nowrap;
}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
h2{font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin:20px 2px 8px;}

/* REGIME */
.regime{text-align:center;}
.pill{display:inline-block;font-size:21px;font-weight:700;padding:8px 24px;border-radius:999px;margin:4px 0 8px;}
.pill.on {background:rgba(63,185,111,.15);color:var(--green);border:1px solid var(--green);}
.pill.neu{background:rgba(216,166,55,.12);color:var(--amber);border:1px solid var(--amber);}
.pill.off{background:rgba(229,83,75,.12); color:var(--red);  border:1px solid var(--red);}
.sizing{color:var(--dim);font-size:14px;}
.comp{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-top:1px solid var(--line);}
.comp:first-of-type{margin-top:10px;}
b.pos{color:var(--green);}b.neg{color:var(--red);}b.flat{color:var(--dim);}

/* BRIEF */
.brief p{margin-bottom:10px;font-size:15px;line-height:1.65;}
.brief .hl{font-size:17px;font-weight:700;margin-bottom:14px;line-height:1.4;}
.brief ul{padding-left:18px;margin:4px 0 10px;}
.brief li{margin-bottom:6px;font-size:14.5px;}
em.j{font-style:normal;color:var(--dim);font-size:13px;}
.sec-head{font-weight:600;margin-top:14px !important;margin-bottom:2px !important;}
.mini-chart{margin:4px 0 14px;}
.mini-label{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-top:3px;}
.mini-label b{color:var(--text);}

/* METRIC CARDS */
.mc{display:grid;grid-template-columns:1fr auto;gap:2px 10px;}
.mc .mn{font-weight:600;}
.mc .mv{font-size:20px;font-weight:700;text-align:right;}
.mc .mchg{font-size:12.5px;text-align:right;}
.mchg.pos{color:var(--green);}.mchg.neg{color:var(--red);}.mchg.flat{color:var(--dim);}
.mc .sp{grid-column:1/-1;margin-top:6px;}
details{grid-column:1/-1;margin-top:8px;font-size:13.5px;color:var(--dim);}
summary{cursor:pointer;color:var(--blue);font-size:13px;list-style:none;}
summary::before{content:"ⓘ ";}

/* SCREEN */
.schecks{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;}
.ck-ok{color:var(--green);}.ck-no{color:var(--red);}.ck-na{color:var(--dim);}
.star{color:var(--amber);font-size:13px;}

/* SCREEN — sector groups + expandable cards */
.sector-head{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 2px;}
.sector-head h3{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);}
.sc-summary{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.sc-expand{display:none;margin-top:10px;border-top:1px solid var(--line);padding-top:10px;}
.sc-expand.open{display:block;}

/* FAV BUTTON */
.fav-btn{background:none;border:none;cursor:pointer;padding:4px;font-size:20px;color:var(--dim);line-height:1;transition:color .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.fav-btn.on{color:#f0c330;}

/* FUNDS */
.fund details summary{color:var(--text);font-weight:600;list-style:none;}
.fund details summary::before{content:none;}
.fund details summary::marker{display:none;}
.ov-row{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-top:1px solid var(--line);}

/* POSITIONS */
.kelly-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:7px 0;border-top:1px solid var(--line);}
.kelly-row:first-child{border-top:none;}
.kelly-num{font-size:21px;font-weight:700;}
.tl-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-top:1px solid var(--line);}
.tl-item:first-child{border-top:none;}
.tl-date{font-size:12px;color:var(--dim);white-space:nowrap;min-width:50px;padding-top:3px;}
.tl-type{font-size:10px;text-transform:uppercase;letter-spacing:.8px;padding:2px 7px;border-radius:4px;white-space:nowrap;font-weight:600;flex-shrink:0;margin-top:1px;}
.tl-type.fomc{background:rgba(91,155,213,.15);color:var(--blue);}
.tl-type.cpi{background:rgba(216,166,55,.15);color:var(--amber);}
.tl-type.nfp{background:rgba(139,152,165,.15);color:var(--dim);}
.tl-type.earn{background:rgba(63,185,111,.15);color:var(--green);}
.tl-type.div{background:rgba(216,166,55,.15);color:var(--amber);}
.tl-label{font-size:14px;flex:1;}

/* SETTINGS */
.srow{padding:10px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:14px;}
.srow:first-child{border-top:none;}
select{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 10px;font-size:14px;}
.trow{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);padding:6px 0;border-top:1px solid var(--line);}
.trow:first-child{border-top:none;}

/* TABS */
.tab-nav{
  position:fixed;bottom:0;left:0;right:0;max-width:640px;margin:0 auto;
  background:var(--card);border-top:1px solid var(--line);
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);
}
.tb{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:9px 2px 7px;gap:3px;font-size:9.5px;color:var(--dim);
  cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent;
  transition:color .15s;
}
.tb.on{color:var(--text);}
.tb .ic{font-size:20px;line-height:1;}

.meta,.foot{color:var(--dim);font-size:12px;text-align:center;margin-top:14px;}
#err{color:var(--amber);text-align:center;padding:24px 10px;display:none;}
</style>
</head>
<body>
<header><h1>📡 Macro Scanner<span id="ver"></span></h1><span id="week"></span></header>
<div id="update-toast" onclick="location.reload()">🔄 New data available — tap to refresh</div>
<div id="err">Couldn't load data. If running locally: <code>python -m http.server -d MacroScanner</code></div>
<main id="app" hidden>

  <!-- OVERVIEW TAB -->
  <section id="t-ov">
    <div class="card regime">
      <div id="pill" class="pill"></div>
      <div class="sizing" id="sizing"></div>
      <div id="comps"></div>
    </div>
    <h2>This week's brief</h2>
    <div class="card brief" id="brief"></div>
    <h2>Liquidity metrics</h2>
    <div id="metrics"></div>
    <h2>How the score works</h2>
    <div class="card" style="font-size:13.5px;color:var(--dim)" id="method"></div>
    <p class="meta" id="meta"></p>
    <p class="foot">Personal research tool · Not financial advice · Data: FRED (St. Louis Fed)</p>
  </section>

  <!-- SCREEN TAB -->
  <section id="t-sc" hidden>
    <div id="screen-wrap"></div>
  </section>

  <!-- FUNDS TAB -->
  <section id="t-fd" hidden>
    <div id="funds-wrap"></div>
  </section>

  <!-- POSITIONS TAB -->
  <section id="t-po" hidden>
    <div id="positions-wrap"></div>
  </section>

  <!-- SETTINGS TAB -->
  <section id="t-st" hidden>
    <div id="settings-wrap"></div>
  </section>

</main>

<nav class="tab-nav" style="left:50%;transform:translateX(-50%);width:100%;max-width:640px;">
  <button class="tb on" data-tab="t-ov"><span class="ic">📊</span>Overview</button>
  <button class="tb" data-tab="t-sc"><span class="ic">🔍</span>Screen</button>
  <button class="tb" data-tab="t-fd"><span class="ic">🧠</span>Funds</button>
  <button class="tb" data-tab="t-po"><span class="ic">⭐</span>Positions</button>
  <button class="tb" data-tab="t-st"><span class="ic">⚙️</span>Settings</button>
</nav>

<script>
// ── TAB SWITCHING ────────────────────────────────────────────────────────────
document.querySelectorAll('.tb').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('section[id^="t-"]').forEach(s => s.hidden = true);
  document.getElementById(btn.dataset.tab).hidden = false;
  if (btn.dataset.tab === 't-po') fetchPositionData();
}));

// ── PREFS ────────────────────────────────────────────────────────────────────
const prefs = {
  garpCount: +(localStorage.getItem('garpCount') || 10),
  tierFilter: localStorage.getItem('tierFilter') || 'all',
};
function savePref(k, v) { prefs[k] = v; localStorage.setItem(k, v); rerender(); }

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmt = (v, u) => u === '$T' ? '$' + v.toFixed(2) + 'T' : u === '%' ? v.toFixed(2) + '%' : v.toFixed(1);
const cls = s => s > 0 ? 'pos' : s < 0 ? 'neg' : 'flat';

function spark(hist, color, h = 64) {
  const W = 560, vs = hist.map(p => p.v);
  const mn = Math.min(...vs), mx = Math.max(...vs), sp = (mx - mn) || 1;
  const pts = vs.map((v, i) => [(i / (vs.length - 1)) * W, h - 6 - ((v - mn) / sp) * (h - 12)]);
  const line = pts.map(p => p.map(n => n.toFixed(1)).join(',')).join(' ');
  return `<svg class="sp" viewBox="0 0 ${W} ${h}" width="100%" height="${h - 8}" preserveAspectRatio="none">
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="2"/>
    <polygon points="0,${h} ${line} ${W},${h}" fill="${color}" opacity="0.08"/></svg>`;
}

function miniSpark(hist, color) {
  const W = 400, H = 52, recent = hist.slice(-26), vs = recent.map(p => p.v);
  const mn = Math.min(...vs), mx = Math.max(...vs), sp = (mx - mn) || 1;
  const pts = vs.map((v, i) => [(i / (vs.length - 1)) * W, H - 4 - ((v - mn) / sp) * (H - 8)]);
  const line = pts.map(p => p.map(n => n.toFixed(1)).join(',')).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="52" preserveAspectRatio="none">
    <polyline points="${line}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round"/>
    <polygon points="0,${H} ${line} ${W},${H}" fill="${color}" opacity="0.14"/></svg>`;
}

const JARGON_DB = {
  'reverse repo': 'cash parked overnight at the Fed by money-market funds — when it drains, money flows back into markets',
  'RRP': 'reverse repo facility — cash parked overnight at the Fed',
  'TGA': "US government's checking account at the Fed — when Treasury spends it down, cash flows to markets",
  'net liquidity': "Fed assets minus reverse repo minus TGA — a proxy for how much cash is free to flow into markets",
  'basis points': '0.01% each — 100 basis points = 1%',
  'HY OAS': 'the extra interest junk bonds must pay above safe Treasury bonds — a market fear gauge',
  'high-yield spread': 'the extra interest junk bonds must pay above safe Treasury bonds',
  'yield curve': '10-year Treasury yield minus 2-year yield — when inverted (negative) it has preceded every modern US recession',
  'QE': 'quantitative easing — Fed buying bonds to inject money into markets',
  'QT': 'quantitative tightening — Fed letting bonds mature to drain money from markets',
};
function addJargon(text) {
  let t = text, used = new Set();
  for (const [term, def] of Object.entries(JARGON_DB)) {
    if (used.has(term)) continue;
    const re = new RegExp('\\b' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
    if (re.test(t)) { t = t.replace(re, `${term} <em class="j">(${def})</em>`); used.add(term); }
  }
  return t;
}

const METRIC_EXPLAIN = {
  net_liquidity: "Fed balance sheet − reverse repo − Treasury's checking account (TGA). A proxy for free-floating cash in the system. Rising = tailwind for risk assets; falling = headwind.",
  walcl: "Total assets held by the Federal Reserve. Goes up when the Fed buys bonds (QE = printing), down when it lets them run off (QT = draining).",
  rrp: "Cash that money-market funds park at the Fed overnight. When RRP falls, that cash flows back out into markets.",
  tga: "The US government's checking account at the Fed. Treasury building it up pulls cash OUT of markets; spending it down pushes cash back in.",
  hy_oas: "The extra yield junk-rated companies must pay above safe Treasuries. The bond market's fear gauge: tightening = confidence, widening = stress. Above 6% = crisis territory.",
  dollar: "Broad trade-weighted dollar index. A falling dollar loosens global conditions; a sharply rising one tightens and breaks things.",
  yield_curve: "10-year minus 2-year Treasury yield. Inversion (negative) has preceded every modern recession; the rapid re-steepening AFTER inversion is the classic danger window.",
};

const M_COLORS = { net_liquidity: '#3fb96f', hy_oas: '#e5534b', dollar: '#5b9bd5', yield_curve: '#d8a637' };
const M_KEYWORDS = {
  net_liquidity: ['liquidity', 'rrp', 'reverse repo', 'fed balance', 'tga', 'treasury account', 'buffer', 'walcl'],
  hy_oas:        ['credit', 'spread', 'high-yield', 'junk', 'stress', 'bond market', 'hy oas'],
  dollar:        ['dollar', ' usd '],
  yield_curve:   ['yield curve', 'inversion', '10-year', '2yr', '10yr', 'steepen'],
};

// ── RENDER BRIEF ─────────────────────────────────────────────────────────────
function renderBrief(b, metrics) {
  if (!b?.body?.length) return '<p class="sizing">No brief yet — Claude writes this every Monday evening.</p>';
  const used = new Set();
  function chartFor(para) {
    const lc = para.toLowerCase();
    for (const [id, kws] of Object.entries(M_KEYWORDS)) {
      if (!used.has(id) && kws.some(k => lc.includes(k)) && metrics?.[id]?.history?.length) {
        used.add(id);
        const m = metrics[id], chg = m.change_13w_pct ?? m.change_13w_pp;
        const chgTxt = chg !== undefined ? (chg > 0 ? '+' : '') + chg + (m.change_13w_pp !== undefined ? 'pp' : '%') + ' / 13w' : '';
        const chgCls = id === 'net_liquidity' ? cls(chg) : cls(-(chg || 0));
        return `<div class="mini-chart">${miniSpark(m.history, M_COLORS[id] || '#8b98a5')}
          <div class="mini-label"><span>${m.name}</span><b style="color:${M_COLORS[id]||'var(--text)'}">${fmt(m.latest, m.unit)} <span class="${chgCls}" style="font-weight:400">${chgTxt}</span></b></div>
        </div>`;
      }
    }
    return '';
  }
  const body = (b.body || []).map(p => `<p>${addJargon(p)}</p>${chartFor(p)}`).join('');
  const watch = b.watch?.length
    ? `<p class="sec-head">👀 Watch next week</p><ul>${b.watch.map(w => `<li>${w}</li>`).join('')}</ul>` : '';
  const flip = b.change_my_mind?.length
    ? `<p class="sec-head">🔄 What would change the view</p><ul>${b.change_my_mind.map(w => `<li>${w}</li>`).join('')}</ul>` : '';
  return `<p class="hl">${b.headline}</p>${body}${watch}${flip}
    <p class="sizing" style="font-size:12px;margin-top:12px">✍️ Written by Claude · ${(b.written_utc || '').slice(0, 10)}</p>`;
}

// ── RENDER METRICS ───────────────────────────────────────────────────────────
function renderMetrics(d) {
  return Object.entries(d.metrics).map(([id, m]) => {
    const chg = m.change_13w_pct ?? m.change_13w_pp;
    const chgCls = id === 'net_liquidity' ? cls(chg) : cls(-(chg ?? 0));
    const chgTxt = chg === undefined ? '' :
      `<span class="mchg ${chgCls}">${chg > 0 ? '+' : ''}${chg}${m.change_13w_pp !== undefined ? 'pp' : '%'} / 13w</span>`;
    return `<div class="card mc">
      <span class="mn">${m.name}</span><span class="mv">${fmt(m.latest, m.unit)}</span>
      <span class="sizing">2-year weekly history</span>${chgTxt}
      ${spark(m.history, M_COLORS[id] || '#8b98a5')}
      <details><summary>what is this?</summary>${METRIC_EXPLAIN[id] || ''}</details>
    </div>`;
  }).join('');
}

// ── SCREENER: COMPOSITE R/R SCORE ────────────────────────────────────────────
let _screenCandidates = {};  // ticker → candidate data (populated in renderScreen)
const _openCards = new Set();  // set of open card IDs (persists across rerenders)

function toggleCard(id) {
  if (_openCards.has(id)) _openCards.delete(id);
  else _openCards.add(id);
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function rrScore(c, hc, regimeLabel) {
  if (!c.peg || c.peg <= 0) return 0;
  const pegFactor = 1.5 / c.peg;  // PEG 1.5 = reference 1.0; lower PEG = higher score
  const fundamentalScore = (c.score / 5) * pegFactor;
  const healthMult = { strong: 1.2, inline: 1.0, weak: 0.8 }[hc?.health] || 1.0;
  const regimeMult = { 'Risk-On': 1.1, 'Neutral': 1.0, 'Risk-Off': 0.9 }[regimeLabel] || 1.0;
  return fundamentalScore * healthMult * regimeMult;
}

// ── RENDER SCREEN ────────────────────────────────────────────────────────────
function renderScreen(s, f, h) {
  if (!s?.candidates?.length)
    return '<div class="card"><p class="sizing">No screen data yet — runs every Monday.</p></div>';

  const smartNames = new Set();
  if (f) for (const fd of (f.funds || []).filter(x => x.ok)) {
    for (const hh of [...(fd.top||[]),(fd.big_adds||[])]) if (hh?.issuer) smartNames.add(hh.issuer.split(' ')[0].toUpperCase());
    for (const nb of fd.new_buys || []) smartNames.add(nb.split(' ')[0].toUpperCase());
  }

  const healthMap = {};
  if (h?.candidates) for (const hc of h.candidates) healthMap[hc.anon] = hc;

  const regimeLabel = _d?.regime?.label || 'Neutral';
  const HLABEL = { strong: '🟢', inline: '🟡', weak: '🔴' };
  const CK = { growth_sweet:'EPS 10–40%', peg_ok:'PEG ≤1.5', rev_confirms:'Rev ≥5%', roe_strong:'ROE ≥12%', debt_ok:'D/E ≤1.0' };

  // Compute R/R score, sort descending, take top N
  const scored = [...s.candidates].map(c => ({
    ...c, _rr: rrScore(c, healthMap[c.anon], regimeLabel)
  })).sort((a, b) => b._rr - a._rr).slice(0, prefs.garpCount);

  // Populate screen lookup for toggleFav
  for (const c of scored) {
    _screenCandidates[c.ticker] = {
      ticker: c.ticker, name: c.name, sector: c.sector,
      score: c.score, peg: c.peg, pe: c.pe,
      eps_growth_pct: c.eps_growth_pct, rev_growth_pct: c.rev_growth_pct,
      roe_pct: c.roe_pct, de: c.de, mcap_b: c.mcap_b, anon: c.anon,
    };
  }

  // Group by sector (preserving R/R order within group)
  const sectors = {};
  for (const c of scored) {
    const sec = c.sector || 'Other';
    if (!sectors[sec]) sectors[sec] = [];
    sectors[sec].push(c);
  }

  let cards = '';
  for (const [sector, cands] of Object.entries(sectors)) {
    cards += `<div class="sector-head">
      <h3>${sector}</h3>
      <span class="sizing" style="font-size:12px">${cands.length} candidate${cands.length > 1 ? 's' : ''}</span>
    </div>`;

    for (const c of cands) {
      const fav = isFav(c.ticker);
      const hc = healthMap[c.anon];
      const smart = smartNames.has(c.name.split(' ')[0].toUpperCase());
      const eid = `sc-${c.ticker}`;
      const isOpen = _openCards.has(eid);

      const checks = Object.entries(c.checks).map(([k, v]) =>
        `<span class="${v === true ? 'ck-ok' : v === false ? 'ck-no' : 'ck-na'}">${v === true ? '✓' : v === false ? '✗' : '–'} ${CK[k]||k}</span>`).join('');

      const vsLine = hc?.scores && Object.keys(hc.scores).length ? (() => {
        const parts = [];
        if (hc.scores.pe_vs_ind)  parts.push(`P/E ${hc.scores.pe_vs_ind.toFixed(1)}× ind`);
        if (hc.scores.peg_vs_ind) parts.push(`PEG ${hc.scores.peg_vs_ind.toFixed(1)}× ind`);
        if (hc.scores.roe_vs_ind) parts.push(`ROE ${hc.scores.roe_vs_ind.toFixed(1)}× ind`);
        return parts.length ? `<div class="schecks" style="color:var(--dim);margin-top:6px">${parts.join(' &nbsp;')}</div>` : '';
      })() : '';

      cards += `<div class="card">
        <div class="sc-summary" onclick="toggleCard('${eid}')">
          <div style="flex:1;min-width:0">
            <span style="font-weight:700;font-size:15px">${c.ticker}</span>
            ${smart ? `<span class="star" style="margin-left:4px">★</span>` : ''}
            <span style="color:var(--dim);font-size:13px;margin-left:5px">${c.name}</span>

function calcAge(birthday) {
  if (!birthday) return null;
  const today = new Date(), bday = new Date(birthday);
  let age = today.getFullYear() - bday.getFullYear();
  if (today.getMonth() - bday.getMonth() < 0 ||
     (today.getMonth() === bday.getMonth() && today.getDate() < bday.getDate())) age--;
  return age;
}

function horizonInfo(age) {
  if (age == null) return null;
  if (age < 30) return { label: '30+ yr horizon', mult: 1.0, note: 'Full quarter-Kelly sizing.' };
  if (age < 40) return { label: '20+ yr horizon', mult: 1.0, note: 'Full quarter-Kelly sizing.' };
  if (age < 50) return { label: '10–20 yr horizon', mult: 0.85, note: '15% Kelly reduction — capital compounding phase.' };
  if (age < 60) return { label: '5–10 yr horizon', mult: 0.65, note: '35% Kelly reduction — preservation creeping in.' };
  return { label: '<5 yr horizon', mult: 0.40, note: '60% Kelly reduction — capital preservation priority.' };
}

// ── KELLY SIZING ──────────────────────────────────────────────────────────────
function kellyCalc(score, peg, winRateOverride, upsideOverride) {
  // Win rate: score 0/5 → 45%, score 5/5 → 65%
  const p = winRateOverride != null ? winRateOverride / 100
    : 0.45 + (Math.min(score || 0, 5) / 5) * 0.20;
  // Reward/risk ratio: PEG 0.3 → 3.0×, PEG 3.0 → 1.5×
  const pegClamped = Math.max(0.3, Math.min(peg || 1.5, 3.0));
  const b = upsideOverride != null ? upsideOverride
    : 1.5 + (3.0 - pegClamped) / (3.0 - 0.3) * 1.5;
  const q = 1 - p;
  const kelly = Math.max(0, (b * p - q) / b);
  const quarterKelly = kelly * 0.25;
  return { p, b, kelly, quarterKelly };
}

function updatePosKelly(ticker, field, val) {
  const positions = getPositions();
  const pos = positions.find(p => p.ticker === ticker);
  if (!pos) return;
  const v = parseFloat(val);
  if (field === 'winRate') pos.winRateOverride = isNaN(v) ? undefined : v;
  if (field === 'upside')  pos.upsideOverride  = isNaN(v) ? undefined : v;
  savePositions(positions);
  renderPositions();
}

function resetPosKelly(ticker) {
  const positions = getPositions();
  const pos = positions.find(p => p.ticker === ticker);
  if (!pos) return;
  delete pos.winRateOverride;
  delete pos.upsideOverride;
  savePositions(positions);
  renderPositions();
}

// ── YAHOO FINANCE (browser-side) ──────────────────────────────────────────────
async function fetchQuote(ticker) {
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`);
    if (!r.ok) return null;
    const d = await r.json();
    return d.chart?.result?.[0]?.meta?.regularMarketPrice || null;
  } catch { return null; }
}

async function fetchCalendar(ticker) {
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v10/finance/quoteSummary/${encodeURIComponent(ticker)}?modules=calendarEvents`);
    if (!r.ok) return null;
    const d = await r.json();
    const cal = d.quoteSummary?.result?.[0]?.calendarEvents;
    return {
      earningsDate: cal?.earnings?.earningsDate?.[0]?.fmt || null,
      divDate: cal?.dividendDate?.fmt || null,
    };
  } catch { return null; }
}

async function fetchPositionData() {
  const positions = getPositions();
  for (const pos of positions) {
    const priceEl = document.getElementById(`price-${pos.ticker}`);
    if (!priceEl) continue;

    const [price, cal] = await Promise.all([fetchQuote(pos.ticker), fetchCalendar(pos.ticker)]);

    let priceHtml = '';
    if (price) {
      const fairPrice = pos.peg > 0 ? price / pos.peg : null;
      const entry = fairPrice ? fairPrice * 1.05 : null;
      const stop = price * 0.85;
      const atFairValue = entry ? price <= entry : false;

      priceHtml += `<div class="card" style="background:var(--card2);border-color:transparent;margin-bottom:8px;padding:10px 14px">
        <div class="kelly-row" style="border:none">
          <span>Current price</span>
          <b>$${price.toFixed(2)}</b>
        </div>`;
      if (fairPrice) {
        priceHtml += `<div class="kelly-row">
          <span style="color:var(--dim)">PEG=1 fair value (Lynch)</span>
          <b class="${atFairValue ? 'pos' : 'neg'}">$${fairPrice.toFixed(2)}</b>
        </div>
        <div class="kelly-row">
          <span style="color:var(--dim)">Buy under</span>
          <b>$${entry.toFixed(2)}</b>
        </div>`;
      }
      priceHtml += `<div class="kelly-row">
          <span style="color:var(--dim)">Initial stop (−15%)</span>
          <b class="neg">$${stop.toFixed(2)}</b>
        </div>`;
      if (!atFairValue && fairPrice) {
        priceHtml += `<p style="font-size:12px;color:var(--dim);margin-top:8px;border-top:1px solid var(--line);padding-top:8px">
          Currently ${((price/fairPrice - 1)*100).toFixed(0)}% above PEG=1 fair value.
          Lynch rule: buy below PEG 1.0–1.2, not above. Wait for a pullback or raise conviction threshold.
        </p>`;
      }
      priceHtml += `</div>`;
    } else {
      priceHtml = `<p style="color:var(--dim);font-size:13px">Price unavailable (market closed or CORS blocked).</p>`;
    }

    if (cal?.earningsDate || cal?.divDate) {
      priceHtml += `<div class="card" style="background:var(--card2);border-color:transparent;margin-bottom:0;padding:10px 14px">
        <p style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px">Key dates</p>`;
      if (cal.earningsDate) priceHtml += `
        <div class="tl-item">
          <span class="tl-date">${cal.earningsDate}</span>
          <span class="tl-type earn">EARN</span>
          <span class="tl-label">${pos.ticker} earnings</span>
        </div>`;
      if (cal.divDate) priceHtml += `
        <div class="tl-item">
          <span class="tl-date">${cal.divDate}</span>
          <span class="tl-type div">DIV</span>
          <span class="tl-label">${pos.ticker} ex-dividend</span>
        </div>`;
      priceHtml += `</div>`;
    }

    priceEl.outerHTML = priceHtml || `<p style="color:var(--dim);font-size:13px">No data.</p>`;
  }
}

function _macroCalendarHTML() {
  const today = new Date().toISOString().slice(0, 10);
  const future = MACRO_CALENDAR.filter(e => e.date >= today).slice(0, 12);
  if (!future.length) return '';
  return `<h2>Macro calendar</h2>
    <div class="card">
      ${future.map(e => `
        <div class="tl-item">
          <span class="tl-date">${e.date.slice(5).replace('-','/')}</span>
          <span class="tl-type ${e.type}">${e.type.toUpperCase()}</span>
          <span class="tl-label">${e.label}</span>
        </div>`).join('')}
    </div>
    <p class="foot">Dates approximate ±3 days · FOMC / BLS CPI / BLS NFP · Add earnings via ☆ in screener</p>`;
}

// ── RENDER SETTINGS ──────────────────────────────────────────────────────────
const THR_KEYS = { liq_pct:'ms_thr_liq', hy_pp:'ms_thr_hy', usd_pct:'ms_thr_usd', hy_crisis:'ms_thr_crisis' };

function getThr(key, fallback) {
  const v = localStorage.getItem(THR_KEYS[key]);
  return v !== null ? parseFloat(v) : fallback;
}

function renderSettings(d) {
  const personal = getPersonal();
  const age = calcAge(personal.birthday);
  const horizon = horizonInfo(age);

  const personalSection = `<h2>Personalisation</h2>
  <div class="card">
    <div class="srow">
      <span>Birthday</span>
      <input type="date" value="${personal.birthday}" max="${new Date().toISOString().slice(0,10)}"
        style="background:var(--card2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:5px 10px;font-size:14px"
        onchange="savePersonal('birthday',this.value)">
    </div>
    ${horizon ? `<p class="sizing" style="padding:2px 0 10px;font-size:13px">${horizon.label} · Kelly multiplier ${(horizon.mult*100).toFixed(0)}% · ${horizon.note}</p>` : '<p class="sizing" style="padding:2px 0 10px;font-size:13px">Enter your birthday to calibrate Kelly sizing to your time horizon.</p>'}
    <div class="srow">
      <span>Portfolio size</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span style="color:var(--dim)">$</span>
        <input type="number" min="1000" step="1000" placeholder="100000"
          value="${personal.portfolioSize || ''}"
          style="width:120px;background:var(--card2);border:1px solid var(--line);border-radius:8px;
                 color:var(--text);padding:5px 10px;font-size:14px;text-align:right"
          onchange="savePersonal('portfolio',this.value)">
      </span>
    </div>
    ${personal.portfolioSize ? `<p class="sizing" style="padding:2px 0 6px;font-size:13px">Dollar sizing shows in Positions tab.</p>` : ''}
  </div>`;

  const base = d?.thresholds || {};
  const THRS = [
    ['liq_pct', 'Net liquidity signal', base.liq_pct||0.5, '%',
     '±0.5% was calibrated so weekly noise doesn\'t trigger false signals. A 13-week move of ≥0.5% is a genuine directional shift. Weighted 2× because liquidity moves markets more than earnings — the Druckenmiller framework.'],
    ['hy_pp', 'Credit spread signal', base.hy_pp||0.3, 'pp',
     '±0.3pp is the noise floor for HY spreads in a stable market. A 0.3pp tightening over 13 weeks signals lenders are genuinely more comfortable with risk.'],
    ['usd_pct', 'Dollar signal', base.usd_pct||1.0, '%',
     '±1% over 13 weeks. A stronger dollar tightens global dollar-denominated credit — below 1% the effect is too small for a 1–3 year investor to care about.'],
    ['hy_crisis', 'Crisis override (HY OAS floor)', base.hy_crisis||6.0, '%',
     'HY spreads above 6% have marked genuine crisis episodes (GFC ~20%, COVID ~11%, 2022 ~6%). At 6%, no liquidity score can override Risk-Off.'],
  ];

  const rows = THRS.map(([key, label, def, unit, why]) => {
    const cur = getThr(key, def);
    const isOverridden = localStorage.getItem(THR_KEYS[key]) !== null && parseFloat(localStorage.getItem(THR_KEYS[key])) !== def;
    return `<div style="padding:12px 0;border-top:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:14px;font-weight:600">${label}${isOverridden ? `<span style="color:var(--amber);font-size:11px"> (overridden)</span>` : ''}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <input type="number" step="0.1" min="0.1" max="20" value="${cur}" data-key="${key}"
            style="width:64px;background:var(--card2);border:1px solid var(--line);border-radius:6px;
                   color:var(--text);padding:4px 8px;font-size:14px;text-align:right"
            oninput="saveThr('${key}',this.value)">
          <span style="color:var(--dim);font-size:13px">${unit}</span>
          ${isOverridden ? `<button onclick="resetThr('${key}')"
            style="background:none;border:1px solid var(--line);border-radius:6px;color:var(--dim);
                   font-size:11px;padding:3px 7px;cursor:pointer">reset</button>` : ''}
        </span>
      </div>
      <p style="font-size:12px;color:var(--dim);line-height:1.5">${why}</p>
    </div>`;
  });

  return `${personalSection}
  <h2>Pipeline thresholds</h2>
  <div class="card" style="font-size:13.5px">
    <div style="padding-bottom:4px;color:var(--dim);font-size:12px">
      Adjust to explore how different thresholds change the regime signal. Changes are local only.
    </div>
    ${rows.join('')}
  </div>
  <p class="meta" style="margin-top:8px">⚙ Stored in your browser. To change what the pipeline computes, edit <code style="color:var(--dim)">pipeline/liquidity.py</code> and push.</p>
  <h2>About</h2>
  <div class="card" style="font-size:13.5px;color:var(--dim)">
    <p>Personal macro-thematic research tool. Inspired by Druckenmiller — watch liquidity first, fundamentals second, supply chains third. Not financial advice.</p>
    <p style="margin-top:8px">Data: FRED · SEC EDGAR · Yahoo Finance · Damodaran/NYU — all free.</p>
    <p style="margin-top:8px">Refreshes every Monday ~7:30pm SGT via GitHub Actions.</p>
  </div>`;
}

function saveThr(key, val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) {
    localStorage.setItem(THR_KEYS[key], v);
    document.getElementById('settings-wrap').innerHTML = renderSettings(_d);
  }
}
function resetThr(key) {
  localStorage.removeItem(THR_KEYS[key]);
  document.getElementById('settings-wrap').innerHTML = renderSettings(_d);
}

// ── LOAD & BOOT ──────────────────────────────────────────────────────────────
let _d, _b, _s, _f, _h;

function rerender() {
  document.getElementById('screen-wrap').innerHTML = renderScreen(_s, _f, _h);
  document.getElementById('funds-wrap').innerHTML = renderFunds(_f);
  document.getElementById('settings-wrap').innerHTML = renderSettings(_d);
  renderPositions();
}

async function load(path) {
  try { const r = await fetch(path + '?t=' + Date.now()); return r.ok ? r.json() : null; }
  catch { return null; }
}

(async () => {
  [_d, _b, _s, _f, _h] = await Promise.all([
    load('data/liquidity.json'), load('data/brief.json'),
    load('data/screen.json'),    load('data/funds.json'),
    load('data/health.json'),
  ]);
  if (!_d) { document.getElementById('err').style.display = 'block'; return; }
  document.getElementById('app').hidden = false;
  document.getElementById('week').textContent = 'week of ' + _d.week_of;

  const genDate = (_d.generated_utc || '').slice(0, 10);
  const verLabel = genDate ? (() => {
    const [, m, day] = genDate.split('-');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1];
    return ' · ' + mon + ' ' + +day;
  })() : '';
  document.getElementById('ver').textContent = verLabel;

  const SEEN_KEY = 'macroscanner_seen_utc';
  const currentUtc = _d.generated_utc || '';
  if (currentUtc && currentUtc > (localStorage.getItem(SEEN_KEY) || '')) {
    localStorage.setItem(SEEN_KEY, currentUtc);
  }
  setInterval(async () => {
    const fresh = await load('data/liquidity.json');
    if (fresh && fresh.generated_utc && fresh.generated_utc > currentUtc) {
      document.getElementById('update-toast').style.display = 'block';
    }
  }, 5 * 60 * 1000);

  const r = _d.regime;
  const EMOJI = { 'Risk-On':'🟢 ', 'Neutral':'🟡 ', 'Risk-Off':'🔴 ' };
  const pill = document.getElementById('pill');
  pill.textContent = (EMOJI[r.label]||'') + r.label + ' (' + (r.score > 0 ? '+' : '') + r.score + ')';
  pill.className = 'pill ' + (r.label === 'Risk-On' ? 'on' : r.label === 'Risk-Off' ? 'off' : 'neu');
  document.getElementById('sizing').textContent = r.sizing_hint + (r.crisis_override ? ' ⚠ crisis override active' : '');
  document.getElementById('comps').innerHTML = r.components.map(c =>
    `<div class="comp"><span>${c.name}: ${c.value > 0 ? '+' : ''}${c.value}${c.unit}</span>
     <b class="${cls(c.signal)}">${c.contribution > 0 ? '+' + c.contribution : c.contribution} pts</b></div>`).join('');

  document.getElementById('brief').innerHTML = renderBrief(_b, _d.metrics);
  document.getElementById('metrics').innerHTML = renderMetrics(_d);
  const t = _d.thresholds;
  document.getElementById('method').innerHTML =
    `Score = 2×liquidity + credit + dollar, each −1/0/+1 over a ${t.lookback_weeks}-week window.<br>
     Triggers: liq ±${t.liq_pct}% · HY spread ±${t.hy_pp}pp · dollar ±${t.usd_pct}%. ≥+2 = Risk-On · ≤−2 = Risk-Off. HY ≥${t.hy_crisis}% → crisis override.`;
  document.getElementById('meta').textContent =
    'Data refreshed ' + (_d.generated_utc||'').replace('T',' ').slice(0,16) + ' UTC · auto-updates Mondays';

  rerender();
})();
</script>
</body>
</html>
