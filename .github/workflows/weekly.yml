name: weekly-refresh

on:
  schedule:
    - cron: "30 11 * * 1"   # every Monday 11:30 UTC
  workflow_dispatch: {}      # manual run button
  push:
    branches: [main]
    paths: ["pipeline/**", ".github/workflows/weekly.yml"]  # re-run on code changes

permissions:
  contents: write

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pipelines (log captured even on failure)
        run: |
          {
            echo "== pipeline run $(date -u +%FT%TZ) =="
            python pipeline/liquidity.py 2>&1 || echo "LIQUIDITY FAILED exit=$?"
            python pipeline/screener.py  2>&1 || echo "SCREENER FAILED exit=$?"
            python pipeline/funds.py     2>&1 || echo "FUNDS FAILED exit=$?"
          } | tee data/run_log.txt
      - name: Commit refreshed data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: weekly refresh"
          git pull --rebase origin main
          git push
      - name: Surface pipeline failures
        run: if grep -q "FAILED" data/run_log.txt; then exit 1; fi
